<!DOCTYPE html>
<html>
<head>
  <title>Aidera</title>

  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      cursor: pointer;
    }

    .login { background: blue; color: white; }
    .register { background: green; color: white; }
    .add { background: #0284c7; color: white; }
    .logout { background: red; color: white; }

    .hidden { display: none; }
  </style>
</head>

<body>

<div class="card" id="auth">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="register" onclick="register()">Register</button>
</div>

<div class="card hidden" id="dash">
  <h2>Dashboard</h2>

  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">
  <input id="area" placeholder="Area">

  <button class="add" onclick="addCustomer()">Add Customer</button>

  <h3>Customers</h3>
  <button onclick="loadCustomers()">Refresh</button>
  <ul id="list"></ul>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<script>
const API = "http://127.0.0.1:8000";

function init(){
  const token = localStorage.getItem("token");

  if(token){
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dash").classList.remove("hidden");
    loadCustomers();
  } else {
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("dash").classList.add("hidden");
  }
}

window.onload = init;


// ---------- AUTH ----------
function register(){
  fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(async r=>{
    const d = await r.json();
    if(r.status !== 200){
      alert("Register failed: " + JSON.stringify(d));
      return;
    }
    alert("Registered successfully");
  });
}

function login(){
  fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(async r=>{
    const d = await r.json();

    if(r.status !== 200){
      alert("Login failed: " + JSON.stringify(d));
      return;
    }

    localStorage.setItem("token", d.token);
    init();
  });
}

function logout(){
  localStorage.clear();
  init();
}


// ---------- CUSTOMERS ----------
function addCustomer(){
  fetch(API + "/customers", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + localStorage.getItem("token")
    },
    body:JSON.stringify({
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
      area: document.getElementById("area").value
    })
  })
  .then(res=>{
    if(res.status === 401){
      logout();
      return;
    }
    loadCustomers();
  });
}

function loadCustomers(){
  fetch(API + "/customers", {
    headers:{
      "Authorization":"Bearer " + localStorage.getItem("token")
    }
  })
  .then(res=>{
    if(res.status === 401){
      logout();
      return null;
    }
    return res.json();
  })
  .then(data=>{
    if(!data) return;

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(c=>{
      list.innerHTML += `
        <li>${c.name} - ${c.phone}
        <button onclick="del(${c.id})">Delete</button></li>`;
    });
  });
}

function del(id){
  fetch(API + "/customers/" + id, {
    method:"DELETE",
    headers:{
      "Authorization":"Bearer " + localStorage.getItem("token")
    }
  })
  .then(()=>loadCustomers());
}
</script>

</body>
</html>
